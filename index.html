<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Mundial 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --accent-teal: #00d9ff;
            --accent-gold: #fbbf24;
            --accent-green: #10b981;
            --light-bg: #f0f9ff;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: white;
            padding: 25px 20px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* BUTTONS */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent-teal);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: #00c8f0;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-success {
            background: var(--accent-green);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .modal-header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        /* TABS */
        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            overflow-x: auto;
        }

        .nav-tabs button {
            padding: 10px 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .nav-tabs button.active {
            color: var(--accent-teal);
            border-bottom-color: var(--accent-teal);
        }

        .nav-tabs button:hover {
            color: var(--text-dark);
        }

        /* STATS */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-teal);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-teal);
        }

        /* MATCH CARDS */
        .matches-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .match-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-teal);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .match-phase {
            background: linear-gradient(135deg, var(--accent-teal) 0%, #00c8f0 100%);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-group {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 600;
        }

        .match-teams {
            margin-bottom: 18px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .team-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            flex: 1;
        }

        .score-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .score-input input {
            width: 50px;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            transition: border-color 0.3s ease;
        }

        .score-input input:focus {
            outline: none;
            border-color: var(--accent-teal);
            background: #f0f9ff;
        }

        .score-separator {
            font-weight: 700;
            color: var(--text-light);
        }

        .match-info {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 16px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 6px;
        }

        .match-actions {
            display: flex;
            gap: 8px;
        }

        .btn-save {
            flex: 1;
            padding: 10px 14px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-save.saved {
            background: var(--accent-teal);
        }

        /* STADIUMS */
        .stadiums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .stadium-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .stadium-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stadium-image {
            font-size: 48px;
            margin-bottom: 15px;
            text-align: center;
        }

        .stadium-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .stadium-detail {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        /* HIDDEN */
        .hidden {
            display: none;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .container {
                padding: 20px 15px;
            }

            .matches-container {
                grid-template-columns: 1fr;
            }

            .match-card {
                padding: 16px;
            }

            .nav-tabs {
                gap: 0;
            }

            .nav-tabs button {
                padding: 8px 12px;
                font-size: 12px;
            }

            .modal-content {
                padding: 25px;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <div>
                    <h1>⚽ MUNDIAL 2026</h1>
                    <div class="header-subtitle">Predictor Global</div>
                </div>
            </div>
            <div class="header-actions">
                <div class="user-badge" id="userBadge">👤 Usuario</div>
                <button class="btn btn-primary btn-small" onclick="openUserModal()">Cambiar Usuario</button>
                <button class="btn btn-success btn-small" onclick="exportToExcel()">📊 Exportar</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- STATS -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-label">📌 Predicciones</div>
                <div class="stat-value" id="completedMatches">0 / 64</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🎯 Precisión</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⭐ Puntos</div>
                <div class="stat-value" id="totalPoints">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">✅ Acertadas</div>
                <div class="stat-value" id="correctPredictions">0</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="nav-tabs">
            <button class="active" onclick="switchTab('groups')">Grupos</button>
            <button onclick="switchTab('round16')">Octavos</button>
            <button onclick="switchTab('quarters')">Cuartos</button>
            <button onclick="switchTab('semis')">Semifinales</button>
            <button onclick="switchTab('final')">Final</button>
            <button onclick="switchTab('stadiums')">Estadios</button>
        </div>

        <!-- MATCHES CONTAINER -->
        <div id="matchesContainer" class="matches-container"></div>

        <!-- STADIUMS CONTAINER -->
        <div id="stadiumsContainer" class="stadiums-grid hidden"></div>
    </div>

    <!-- USER MODAL -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👤 Datos del Predictor</h2>
                <p>Completa tus datos para guardar tus predicciones</p>
            </div>
            <form onsubmit="saveUserData(event)">
                <div class="form-group">
                    <label for="userName">Nombre Completo</label>
                    <input type="text" id="userName" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="userEmail">Correo Electrónico</label>
                    <input type="email" id="userEmail" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="userTeam">Equipo Favorito</label>
                    <input type="text" id="userTeam" placeholder="Tu equipo favorito">
                </div>
                <div class="form-group">
                    <label for="userPhone">Teléfono (Opcional)</label>
                    <input type="tel" id="userPhone" placeholder="+57 123 456 7890">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeUserModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar Datos</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // DATA ESTRUCTURA - MUNDIAL 2026
        const MUNDIAL_2026 = {
            groups: {
                A: {
                    name: 'Grupo A',
                    teams: ['Uruguay', 'Paraguay', 'Colombia', 'Marruecos']
                },
                B: {
                    name: 'Grupo B',
                    teams: ['España', 'Países Bajos', 'Alemania', 'Italia']
                },
                C: {
                    name: 'Grupo C',
                    teams: ['Francia', 'Dinamarca', 'Perú', 'Canadá']
                },
                D: {
                    name: 'Grupo D',
                    teams: ['Argentina', 'Brasil', 'Montenegro', 'Kazajstán']
                },
                E: {
                    name: 'Grupo E',
                    teams: ['Inglaterra', 'Suiza', 'Serbia', 'Irlanda del Norte']
                },
                F: {
                    name: 'Grupo F',
                    teams: ['Bélgica', 'Rumania', 'Croacia', 'Armenia']
                },
                G: {
                    name: 'Grupo G',
                    teams: ['Portugal', 'Eslovenia', 'Camerún', 'Ghana']
                },
                H: {
                    name: 'Grupo H',
                    teams: ['Japón', 'Qatar', 'Irán', 'Uzbekistán']
                }
            },
            stadiums: [
                { name: 'MetLife Stadium', city: 'Nueva Jersey', country: 'USA', capacity: 82500, year: 1976 },
                { name: 'SoFi Stadium', city: 'Inglewood, California', country: 'USA', capacity: 70240, year: 2020 },
                { name: 'Arrowhead Stadium', city: 'Kansas City', country: 'USA', capacity: 76416, year: 1972 },
                { name: 'AT&T Stadium', city: 'Arlington, Texas', country: 'USA', capacity: 80000, year: 2009 },
                { name: 'Levi\'s Stadium', city: 'Santa Clara, California', country: 'USA', capacity: 68500, year: 2014 },
                { name: 'Mercedes-Benz Stadium', city: 'Atlanta', country: 'USA', capacity: 70000, year: 2017 },
                { name: 'Estadio Azteca', city: 'Ciudad de México', country: 'México', capacity: 87506, year: 1966 },
                { name: 'Estadio BBVA', city: 'Monterrey', country: 'México', capacity: 53000, year: 2015 },
                { name: 'BMO Field', city: 'Toronto', country: 'Canadá', capacity: 45598, year: 1999 }
            ]
        };

        // CONFIGURACIÓN DE USUARIO
        let userData = {
            name: 'Usuario',
            email: '',
            team: '',
            phone: ''
        };

        // PREDICCIONES
        let predictions = {};

        // GENERAR PARTIDOS DE GRUPOS
        function generateGroupMatches() {
            let matches = [];
            let matchId = 1;
            const stadiums = MUNDIAL_2026.stadiums;

            Object.keys(MUNDIAL_2026.groups).forEach((groupKey, groupIdx) => {
                const group = MUNDIAL_2026.groups[groupKey];
                const teams = group.teams;
                const stadium = stadiums[matchId % stadiums.length];

                // Generar todos los partidos del grupo
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        matches.push({
                            id: matchId++,
                            phase: 'groups',
                            group: groupKey,
                            home: teams[i],
                            away: teams[j],
                            stadium: stadium.name,
                            date: `Junio 2026`
                        });
                    }
                }
            });

            return matches;
        }

        // GENERAR PARTIDOS DE OCTAVOS
        function generateKnockoutMatches() {
            let matches = [];
            let matchId = 100;
            const stadiums = MUNDIAL_2026.stadiums;

            // Octavos de Final (16 partidos)
            const round16Pairings = [
                { home: '1A', away: '2B' },
                { home: '1B', away: '2A' },
                { home: '1C', away: '2D' },
                { home: '1D', away: '2C' },
                { home: '1E', away: '2F' },
                { home: '1F', away: '2E' },
                { home: '1G', away: '2H' },
                { home: '1H', away: '2G' }
            ];

            round16Pairings.forEach((pairing, idx) => {
                matches.push({
                    id: matchId++,
                    phase: 'round16',
                    home: pairing.home,
                    away: pairing.away,
                    stadium: stadiums[idx % stadiums.length].name,
                    matchNumber: idx + 1
                });
            });

            // Cuartos de Final (8 partidos)
            const quartersPairings = [
                { home: 'W1', away: 'W2' },
                { home: 'W3', away: 'W4' },
                { home: 'W5', away: 'W6' },
                { home: 'W7', away: 'W8' }
            ];

            quartersPairings.forEach((pairing, idx) => {
                matches.push({
                    id: matchId++,
                    phase: 'quarters',
                    home: pairing.home,
                    away: pairing.away,
                    stadium: stadiums[idx % stadiums.length].name,
                    matchNumber: idx + 1
                });
            });

            // Semifinales (2 partidos)
            matches.push({
                id: matchId++,
                phase: 'semis',
                home: 'Semifinal 1A',
                away: 'Semifinal 1B',
                stadium: stadiums[0].name,
                matchNumber: 1
            });

            matches.push({
                id: matchId++,
                phase: 'semis',
                home: 'Semifinal 2A',
                away: 'Semifinal 2B',
                stadium: stadiums[1].name,
                matchNumber: 2
            });

            // Final
            matches.push({
                id: matchId++,
                phase: 'final',
                home: 'Campeón 1',
                away: 'Campeón 2',
                stadium: stadiums[0].name,
                matchNumber: 1
            });

            // Tercer puesto
            matches.push({
                id: matchId++,
                phase: 'final',
                home: 'Perdedor Semi 1',
                away: 'Perdedor Semi 2',
                stadium: stadiums[1].name,
                matchNumber: 2
            });

            return matches;
        }

        const ALL_MATCHES = [...generateGroupMatches(), ...generateKnockoutMatches()];

        // CARGAR DATOS
        function loadData() {
            const saved = localStorage.getItem('userData');
            if (saved) {
                userData = JSON.parse(saved);
                updateUserBadge();
            }
            
            const savedPreds = localStorage.getItem('predictions');
            if (savedPreds) {
                predictions = JSON.parse(savedPreds);
            }
        }

        // ACTUALIZAR BADGE DE USUARIO
        function updateUserBadge() {
            const badge = document.getElementById('userBadge');
            badge.textContent = `👤 ${userData.name}`;
        }

        // MODAL DE USUARIO
        function openUserModal() {
            document.getElementById('userModal').classList.add('active');
            document.getElementById('userName').value = userData.name;
            document.getElementById('userEmail').value = userData.email;
            document.getElementById('userTeam').value = userData.team;
            document.getElementById('userPhone').value = userData.phone;
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function saveUserData(e) {
            e.preventDefault();
            userData.name = document.getElementById('userName').value;
            userData.email = document.getElementById('userEmail').value;
            userData.team = document.getElementById('userTeam').value;
            userData.phone = document.getElementById('userPhone').value;

            localStorage.setItem('userData', JSON.stringify(userData));
            updateUserBadge();
            closeUserModal();
            alert('✅ Datos guardados exitosamente');
        }

        // CAMBIAR TAB
        function switchTab(tab) {
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('matchesContainer');
            const stadiumsContainer = document.getElementById('stadiumsContainer');

            if (tab === 'stadiums') {
                renderStadiums();
            } else {
                container.classList.remove('hidden');
                stadiumsContainer.classList.add('hidden');
                renderMatches(tab);
            }
        }

        // RENDERIZAR PARTIDOS
        function renderMatches(phase = 'groups') {
            const container = document.getElementById('matchesContainer');
            const filtered = ALL_MATCHES.filter(m => m.phase === phase);

            container.innerHTML = filtered.map(match => {
                const pred = predictions[match.id] || {};
                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div class="match-phase">${phase === 'groups' ? 'GRUPOS' : phase === 'round16' ? 'OCTAVOS' : phase === 'quarters' ? 'CUARTOS' : phase === 'semis' ? 'SEMIFINAL' : 'FINAL'}</div>
                            <div class="match-group">${match.group ? 'Grupo ' + match.group : `Partido ${match.matchNumber || ''}`}</div>
                        </div>
                        <div class="match-teams">
                            <div class="team-row">
                                <span class="team-name">${match.home}</span>
                            </div>
                            <div class="score-input">
                                <input type="number" id="pred_${match.id}_home" value="${pred.home || ''}" min="0" max="15" placeholder="0">
                                <span class="score-separator">-</span>
                                <input type="number" id="pred_${match.id}_away" value="${pred.away || ''}" min="0" max="15" placeholder="0">
                            </div>
                            <div class="team-row">
                                <span class="team-name">${match.away}</span>
                            </div>
                        </div>
                        <div class="match-info">📍 ${match.stadium}</div>
                        <div class="match-actions">
                            <button class="btn-save" onclick="savePrediction(${match.id})">💾 Guardar</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // RENDERIZAR ESTADIOS
        function renderStadiums() {
            const container = document.getElementById('matchesContainer');
            const stadiumsContainer = document.getElementById('stadiumsContainer');
            
            container.classList.add('hidden');
            stadiumsContainer.classList.remove('hidden');

            stadiumsContainer.innerHTML = MUNDIAL_2026.stadiums.map(stadium => `
                <div class="stadium-card">
                    <div class="stadium-image">🏟️</div>
                    <div class="stadium-name">${stadium.name}</div>
                    <div class="stadium-detail">📍 ${stadium.city}, ${stadium.country}</div>
                    <div class="stadium-detail">👥 Capacidad: ${stadium.capacity.toLocaleString()}</div>
                    <div class="stadium-detail">📅 Inaugurado: ${stadium.year}</div>
                </div>
            `).join('');
        }

        // GUARDAR PREDICCIÓN
        function savePrediction(matchId) {
            const homeInput = document.getElementById(`pred_${matchId}_home`);
            const awayInput = document.getElementById(`pred_${matchId}_away`);

            if (homeInput.value === '' || awayInput.value === '') {
                alert('⚠️ Por favor completa ambas predicciones');
                return;
            }

            predictions[matchId] = {
                home: parseInt(homeInput.value),
                away: parseInt(awayInput.value),
                timestamp: new Date().toISOString()
            };

            localStorage.setItem('predictions', JSON.stringify(predictions));

            const btn = event.target;
            btn.classList.add('saved');
            btn.textContent = '✅ Guardado';
            setTimeout(() => {
                btn.classList.remove('saved');
                btn.textContent = '💾 Guardar';
            }, 2000);

            updateStats();
        }

        // ACTUALIZAR ESTADÍSTICAS
        function updateStats() {
            const completed = Object.keys(predictions).length;
            const total = ALL_MATCHES.length;

            document.getElementById('completedMatches').textContent = `${completed} / ${total}`;
            document.getElementById('accuracy').textContent = completed > 0 
                ? `${Math.round((completed / total) * 100)}%`
                : '0%';
        }

        // EXPORTAR A EXCEL
        function exportToExcel() {
            if (Object.keys(predictions).length === 0) {
                alert('⚠️ No hay predicciones para exportar');
                return;
            }

            // Crear workbook
            const wb = XLSX.utils.book_new();

            // HOJA 1: INFORMACIÓN DEL USUARIO
            const userSheet = [
                ['INFORMACIÓN DEL PREDICTOR'],
                [],
                ['Nombre:', userData.name],
                ['Email:', userData.email],
                ['Equipo Favorito:', userData.team],
                ['Teléfono:', userData.phone],
                ['Fecha de Exportación:', new Date().toLocaleString('es-ES')],
                []
            ];

            // HOJA 2: PREDICCIONES
            const predSheet = [
                ['ID', 'Fase', 'Grupo', 'Equipo Local', 'Equipo Visitante', 'Goles Local', 'Goles Visitante', 'Estadio', 'Fecha Guardado']
            ];

            ALL_MATCHES.forEach(match => {
                if (predictions[match.id]) {
                    const pred = predictions[match.id];
                    predSheet.push([
                        match.id,
                        match.phase,
                        match.group || '-',
                        match.home,
                        match.away,
                        pred.home,
                        pred.away,
                        match.stadium,
                        new Date(pred.timestamp).toLocaleString('es-ES')
                    ]);
                }
            });

            // Agregar hojas
            XLSX.utils.sheet_add_aoa(wb.Sheets['Sheet1'] || (wb.Sheets['Sheet1'] = XLSX.utils.aoa_to_sheet([])), userSheet);
            XLSX.utils.sheet_add_aoa(wb.Sheets['Predicciones'] || (wb.Sheets['Predicciones'] = XLSX.utils.aoa_to_sheet([])), predSheet);

            // Crear workbook correctamente
            const wsUser = XLSX.utils.aoa_to_sheet(userSheet);
            const wsPred = XLSX.utils.aoa_to_sheet(predSheet);

            const wb2 = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb2, wsUser, 'Predictor');
            XLSX.utils.book_append_sheet(wb2, wsPred, 'Predicciones');

            // Descargar
            XLSX.writeFile(wb2, `Mundial2026_${userData.name.replace(/\s/g, '_')}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // INICIALIZAR
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderMatches('groups');
            updateStats();

            // Cerrar modal al hacer clic fuera
            document.getElementById('userModal').addEventListener('click', (e) => {
                if (e.target.id === 'userModal') closeUserModal();
            });

            // Mostrar modal si no hay usuario
            if (userData.name === 'Usuario') {
                openUserModal();
            }
        });
    </script>
</body>
</html>
