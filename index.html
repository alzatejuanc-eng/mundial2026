<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Predictor interactivo de resultados del Mundial 2026 - Transformación ExO">
    <meta name="theme-color" content="#1d3a5a">
    <title>⚽ Mundial 2026 - Predictor de Resultados | Transformación ExO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-decoration"></div>
        <div class="header-content">
            <div class="header-top">
                <div class="logo">⚽ MUNDIAL 2026</div>
                <div class="score-badge">
                    Puntos: <span id="totalScore">0</span>/128
                </div>
            </div>
            <div class="title-section">
                <h1>PREDICE EL FUTURO</h1>
                <p>Del fútbol mundial en USA, México y Canadá</p>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- ESTADÍSTICAS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Partidos Completados</div>
                <div class="stat-value" id="matchesPlayed">0/88</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Aciertos</div>
                <div class="stat-value" id="correctPredictions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Porcentaje</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mejor Fase</div>
                <div class="stat-value" id="bestPhase">-</div>
            </div>
        </div>

        <!-- NAVEGACIÓN -->
        <div class="navigation">
            <button class="nav-item active" data-phase="groups">📊 Fase de Grupos</button>
            <button class="nav-item" data-phase="ro16">🏆 16vos de Final</button>
            <button class="nav-item" data-phase="quarters">🎖️ Cuartos</button>
            <button class="nav-item" data-phase="semis">🥇 Semifinales</button>
            <button class="nav-item" data-phase="final">🏅 Final</button>
            <button class="nav-item" data-phase="3rd">🥉 3º Lugar</button>
            
            <div class="nav-spacer"></div>
            
            <button class="nav-item" data-phase="stadiums">🏟️ Estadios</button>
            <button class="btn btn-danger btn-sm" onclick="app.exportData()">📥 Exportar</button>
            <button class="btn btn-secondary btn-sm" onclick="app.resetAll()">🔄 Reiniciar</button>
        </div>

        <!-- CONTENEDOR DE PARTIDOS -->
        <div id="phasesContainer"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>🏆 <strong>Mundial 2026</strong> | 11 de Junio - 19 de Julio</p>
        <p>USA 🇺🇸 | México 🇲🇽 | Canadá 🇨🇦</p>
        <p>Predictor by <strong>Transformación ExO</strong> © 2026</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
